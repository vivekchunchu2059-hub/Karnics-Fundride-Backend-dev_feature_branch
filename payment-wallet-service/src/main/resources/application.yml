server:
  port: 8082

spring:
  application:
    name: payment-wallet-service

  config:
    import: optional:configserver:http://localhost:8888

  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: INFO
    com.funride: DEBUG
  file:
    path: logs

